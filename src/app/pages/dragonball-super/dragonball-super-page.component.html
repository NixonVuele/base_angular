<h1>Hola Pagina DragonBall</h1>
<hr />

<section class="row">
    <div class="col-12 col-sm-6">
        <app-character-add
        (newCharacter)="dragonballService.addCharacter($event)"/>
    </div>

    <div class="col-12 col-sm-6">
    <app-character-list
    [characters]="dragonballService.characters()"
    [listName]="'Listado de Personajes'"/>
</div>
</section>
